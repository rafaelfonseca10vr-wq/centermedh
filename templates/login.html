{% extends "base.html" %}

{% block title %}Login - CENTERMEDH WEB SYSTEM{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center py-3" style="background-color: white !important; color: #333 !important;">
                <h4 class="mb-0 text-center">
                    <img src="/static/logo.png" alt="" style="height: 40px;">
                </h4>
                <p class="mb-0">Faça login para continuar</p>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-1"></i>Usuário
                        </label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-1"></i>Senha
                        </label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt me-1"></i>Entrar
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Não tem uma conta?</p>
                    <a href="{{ url_for('cadastro') }}" class="btn btn-outline-success">
                        <i class="fas fa-user-plus me-1"></i>Criar Conta
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
